# after editing, run (https://github.com/konflux-ci/rpm-lockfile-prototype):
#   rpm-lockfile-prototype -f Containerfile rpms.in.yaml
# to regen rpms.lock.yaml
# Note that the repoid values are special, and must be from here:
# https://github.com/release-engineering/rhtap-ec-policy/blob/main/data/known_rpm_repositories.yml
arches:
  - x86_64
  - aarch64
allowerasing: true
contentOrigin:
  repos:
    - repoid: ubi-9-for-$basearch-appstream-rpms
      baseurl: https://cdn-ubi.redhat.com/content/public/ubi/dist/ubi9/9/$basearch/appstream/os/
    - repoid: ubi-9-for-$basearch-appstream-source-rpms
      baseurl: https://cdn-ubi.redhat.com/content/public/ubi/dist/ubi9/9/$basearch/appstream/source/SRPMS
    - repoid: ubi-9-for-$basearch-baseos-rpms
      baseurl: https://cdn-ubi.redhat.com/content/public/ubi/dist/ubi9/9/$basearch/baseos/os/
    - repoid: ubi-9-for-$basearch-baseos-source-rpms
      baseurl: https://cdn-ubi.redhat.com/content/public/ubi/dist/ubi9/9/$basearch/baseos/source/SRPMS
    # OpenShift clients RPM (oc, kubectl)
    - repoid: rhocp-4.21-for-rhel-9-$basearch-rpms
      baseurl: https://mirror.openshift.com/pub/openshift-v4/$basearch/dependencies/rpms/4.21-el9-beta/
    # Helm RPM and related tools. 
    - repoid: ocp-tools-4.18-for-rhel-9-$basearch-rpms
      baseurl: https://rhsm-pulp.corp.redhat.com/content/dist/layered/rhel9/$basearch/ocp-tools/4.18/os/
    - repoid: ocp-tools-4.18-for-rhel-9-$basearch-source-rpms
      baseurl: https://rhsm-pulp.corp.redhat.com/content/dist/layered/rhel9/$basearch/ocp-tools/4.18/source/SRPMS

# New installs beyond ubi9-minimal (keep in sync with root Containerfile and Konflux
# `.rhdh/docker/Containerfile`: final-stage microdnf + websocat-builder `rust-toolset`).
packages:
  - findutils
  - gzip
  - helm
  - jq
  - openshift-clients
  - python3
  - python3-pip
  - rsync
  - rust-toolset
  - tar
  - util-linux

# Already on ubi9-minimal but listed in Containerfile microdnf lines; reinstall forces lockfile entries.
reinstallPackages:
  - bash
  - grep
  - sed
  - shadow-utils
