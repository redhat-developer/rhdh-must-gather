repos:
  - repo: local
    hooks:
      - id: check-requirements-version
        name: check yq version sync (Makefile vs requirements.in)
        entry: hack/check-requirements-version.sh
        language: script
        pass_filenames: false
        files: (^Makefile$|^\.rhdh/docker/requirements\.in$)

  - repo: https://github.com/jazzband/pip-tools
    rev: v7.5.3
    hooks:
      - id: pip-compile
        name: pip-compile (.rhdh/docker)
        language_version: "3.14"
        args:
          - --allow-unsafe
          - --generate-hashes
          - --output-file=.rhdh/docker/requirements.txt
          - .rhdh/docker/requirements.in
        files: ^\.rhdh/docker/requirements\.(in|txt)$


  - repo: local
    hooks:
      - id: uv-pip-compile-build-deps
        name: uv pip compile build deps (.rhdh/docker)
        entry: uv pip compile --python-version=3.9 --python-platform=linux
          --generate-hashes
          --output-file=.rhdh/docker/requirements-build.txt
          .rhdh/docker/requirements-build.in
        language: python
        additional_dependencies: [uv]
        files: ^\.rhdh/docker/requirements-build\.(in|txt)$
        pass_filenames: false
