apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhdh-must-gather
  namespace: rhdh-must-gather
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rhdh-must-gather
      component: data-holder
  template:
    metadata:
      labels:
        app: rhdh-must-gather
        component: data-holder
    spec:
      serviceAccountName: rhdh-must-gather-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
      initContainers:
      - name: gather
        image: quay.io/rhdh-community/rhdh-must-gather:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: BASE_COLLECTION_PATH
          value: "/must-gather"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: output
          mountPath: /must-gather
        - name: sa-token
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      containers:
      - name: data-holder
        image: quay.io/rhdh-community/rhdh-must-gather:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        command:
        - sleep
        - infinity
        volumeMounts:
        - name: output
          mountPath: /must-gather
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: sa-token
        projected:
          sources:
          - serviceAccountToken:
              expirationSeconds: 3600
              path: token
          - configMap:
              name: kube-root-ca.crt
              items:
              - key: ca.crt
                path: ca.crt
          - downwardAPI:
              items:
              - path: namespace
                fieldRef:
                  fieldPath: metadata.namespace
      - name: output
        ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
