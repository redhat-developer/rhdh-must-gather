apiVersion: v1
kind: Pod
metadata:
  name: rhdh-must-gather-data-retriever
  namespace: rhdh-must-gather
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    fsGroup: 1001
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - rhdh-must-gather
          - key: component
            operator: In
            values:
            - gather
        topologyKey: kubernetes.io/hostname
  containers:
  - name: data-retriever
    image: quay.io/rhdh-community/rhdh-must-gather:latest
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    command:
    - sleep
    - infinity
    volumeMounts:
    - name: must-gather-output
      mountPath: /data
      readOnly: true
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
  volumes:
  - name: must-gather-output
    persistentVolumeClaim:
      claimName: rhdh-must-gather-pvc

