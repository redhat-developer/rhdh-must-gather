apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhdh-must-gather
rules:
- apiGroups: [""]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: ["apps", "extensions"]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["networking.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["storage.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list"]
# Platform detection (gather_platform): clusterversions, infrastructures
- apiGroups: ["config.openshift.io"]
  resources: ["clusterversions", "infrastructures"]
  verbs: ["get", "list"]
# Route collection (gather_route)
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["get", "list"]
- apiGroups: ["rhdh.redhat.com"]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["operators.coreos.com"]
  resources: ["*"]
  verbs: ["get", "list"]
# Orchestrator-related permissions
- apiGroups: ["sonataflow.org"]
  resources: ["sonataflowplatforms", "sonataflows", "sonataflowclusterplatforms", "sonataflowbuilds"]
  verbs: ["get", "list"]
- apiGroups: ["operator.knative.dev"]
  resources: ["knativeservings", "knativeeventings"]
  verbs: ["get", "list"]
- apiGroups: ["operator.serverless.openshift.io"]
  resources: ["knativekafkas"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhdh-must-gather
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhdh-must-gather
subjects:
- kind: ServiceAccount
  name: rhdh-must-gather-sa
  namespace: rhdh-must-gather
