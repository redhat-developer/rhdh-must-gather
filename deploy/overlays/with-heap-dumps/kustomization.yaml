# Example: Enable heap dump collection with larger storage
#
# Usage:
#   kubectl apply -k deploy/overlays/with-heap-dumps
#
# This overlay:
#   - Increases ephemeral volume storage to 10Gi (heap dumps can be large)
#   - Increases memory limits for the gather init container
#   - Adds --with-heap-dumps argument to the gather script
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: rhdh-must-gather
    patch: |
      # Increase ephemeral volume storage for heap dumps
      - op: replace
        path: /spec/template/spec/volumes/0/ephemeral/volumeClaimTemplate/spec/resources/requests/storage
        value: 10Gi
      # Add --with-heap-dumps argument to the gather init container
      - op: add
        path: /spec/template/spec/initContainers/0/args
        value:
          - "--with-heap-dumps"
      # Increase memory limits for the gather init container
      - op: replace
        path: /spec/template/spec/initContainers/0/resources/limits/memory
        value: "1Gi"
