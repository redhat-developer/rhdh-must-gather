name: Nightly E2E Tests

on:
  schedule:
    - cron: '38 21 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-tests:
    name: Nightly E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq skopeo
          # Install yq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: rhdh-must-gather-e2e
          wait: 120s

      - name: Run E2E tests
        run: make test-e2e LOCAL=false

      - name: Display must-gather process logs
        if: ${{ success() || failure() }}
        run: |
          cat rhdh-must-gather-output.k8s.*/must-gather.log || true

      - name: Upload E2E must-gather output in case of failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-must-gather-output-nightly
          path: e2e-cluster.mustgather.tar.gz
          retention-days: 7

      - name: Upload must-gather output
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: must-gather-output-nightly
          path: |
            rhdh-must-gather-output.k8s.*.tar.gz
            rhdh-must-gather-output.k8s.*/
          retention-days: 7

  e2e-tests-heap-dumps:
    name: Nightly E2E Tests (Heap Dumps - ${{ matrix.method }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        method: [auto, inspector, sigusr2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq skopeo
          # Install yq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: rhdh-must-gather-e2e-heap-${{ matrix.method }}
          wait: 120s

      - name: Run E2E tests with heap dumps (${{ matrix.method }} method)
        run: |
          if [ "${{ matrix.method }}" = "auto" ]; then
            # Auto: let the tool use its built-in default method (inspector)
            make test-e2e LOCAL=false WITH_HEAP_DUMPS=true
          else
            make test-e2e LOCAL=false WITH_HEAP_DUMPS=true HEAP_DUMP_METHOD=${{ matrix.method }}
          fi

      - name: Display must-gather process logs
        if: ${{ success() || failure() }}
        run: |
          cat rhdh-must-gather-output.k8s.*/must-gather.log || true

      - name: Upload E2E must-gather output in case of failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-must-gather-output-heap-dumps-${{ matrix.method }}-nightly
          path: e2e-cluster.mustgather.tar.gz
          retention-days: 7

      - name: Upload must-gather output
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: must-gather-output-heap-dumps-${{ matrix.method }}-nightly
          path: |
            rhdh-must-gather-output.k8s.*.tar.gz
            rhdh-must-gather-output.k8s.*/
          retention-days: 7
