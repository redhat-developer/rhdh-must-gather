name: PR Build (Hermetic)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - release-1.[0-9]+

env:
  IMAGE_NAME: rhdh-must-gather

jobs:
  pr-build:
    name: Build PR Container Image (Hermetic)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      image-built: ${{ steps.changed-files.outputs.any_changed }}
      image-tag: ${{ steps.prep.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            .github/workflows/pr-build.yaml
            .github/workflows/pr-push.yaml
            .github/actions/docker-build/**
            Makefile
            Containerfile
            .containerignore
            collection-scripts/**
            requirements*.txt
            requirements*.in
            rpms.in.yaml
            rpms.lock.yaml
            vendor/websocat/Cargo.lock
            vendor/websocat/Cargo.toml
            scripts/local-hermeto-build.sh
            LICENSE
          files_ignore: |
            **/*.md
            **/*.adoc
            examples/**

      - name: List all changed files (for troubleshooting)
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          printf '%s\n' "$ALL_CHANGED_FILES" | while IFS= read -r file; do
            echo "Changed: $file"
          done

      - name: Prepare build variables
        if: steps.changed-files.outputs.any_changed == 'true'
        id: prep
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHORT_SHA="${PR_HEAD_SHA:0:9}"
          VERSION="0.0.0-${SHORT_SHA}"

          echo "IMAGE_TAG=pr-${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "EXTRA_TAGS=pr-${PR_NUM}-${SHORT_SHA} ${VERSION}-pr-${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build image (hermetic)
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: ./.github/actions/docker-build
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTags: |
            type=raw,value=${{ steps.prep.outputs.IMAGE_TAG }}
          imageLabels: |
            org.opencontainers.image.version=${{ steps.prep.outputs.VERSION }}
          buildArgs: |
            RHDH_MUST_GATHER_VERSION=${{ steps.prep.outputs.VERSION }}

      - name: Create metadata for push workflow
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE_TAG: ${{ steps.prep.outputs.IMAGE_TAG }}
          EXTRA_TAGS: ${{ steps.prep.outputs.EXTRA_TAGS }}
          VERSION: ${{ steps.prep.outputs.VERSION }}
        run: |
          jq -n \
            --argjson pr "$PR_NUMBER" \
            --arg it "$IMAGE_TAG" \
            --arg et "$EXTRA_TAGS" \
            --arg vs "$VERSION" \
            '{pr_number: $pr, image_tag: $it, extra_tags: $et, version: $vs}' > metadata.json

          # Upload metadata alongside the image artifact
          ARTIFACT_DIR=$(find ./podman-artifacts -maxdepth 0 -type d 2>/dev/null || true)
          if [[ -d "./podman-artifacts" ]]; then
            cp metadata.json ./podman-artifacts/metadata.json
          fi

      - name: Upload metadata artifact
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-metadata
          path: metadata.json
          retention-days: 1

      - name: Summary
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          VERSION: ${{ steps.prep.outputs.VERSION }}
          IMAGE_TAG: ${{ steps.prep.outputs.IMAGE_TAG }}
          EXTRA_TAGS: ${{ steps.prep.outputs.EXTRA_TAGS }}
        run: |
          ALL_TAGS="\`${IMAGE_TAG}\`"
          for tag in ${EXTRA_TAGS}; do
            ALL_TAGS="${ALL_TAGS}, \`${tag}\`"
          done

          echo "### Build Summary (Hermetic)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Number**: ${PR_NUM}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Built hermetically (--network none) and saved as artifact" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: ${ALL_TAGS}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The image will be pushed by the PR Push workflow." >> $GITHUB_STEP_SUMMARY

  e2e-tests:
    name: E2E Tests (Container Image)
    needs: pr-build
    if: needs.pr-build.outputs.image-built == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: podman-image-${{ github.event.pull_request.number }}

      - name: Load image into podman
        env:
          TAG: ${{ needs.pr-build.outputs.image-tag }}
          NAME: ${{ env.IMAGE_NAME }}
        run: |
          podman load -i image.tar
          podman tag "${NAME}:${TAG}" "localhost/${NAME}:${TAG}"
          podman images

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq skopeo

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: rhdh-must-gather-e2e
          wait: 120s

      - name: Load image into Kind cluster
        env:
          TAG: ${{ needs.pr-build.outputs.image-tag }}
          NAME: ${{ env.IMAGE_NAME }}
        run: |
          podman save --format docker-archive "localhost/${NAME}:${TAG}" \
            | kind load image-archive /dev/stdin --name rhdh-must-gather-e2e

      - name: Run E2E tests
        env:
          TAG: ${{ needs.pr-build.outputs.image-tag }}
          NAME: ${{ env.IMAGE_NAME }}
        run: |
          make test-e2e \
            LOCAL=false \
            FULL_IMAGE_NAME="localhost/${NAME}:${TAG}" \
            HELM_SET="image.pullPolicy=Never,resources=null,dataHolder.resources=null"

      - name: Upload E2E must-gather output in case of failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-must-gather-output-pr-${{ github.event.pull_request.number }}
          path: e2e-cluster.mustgather.tar.gz
          retention-days: 7

      - name: Upload must-gather output
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: must-gather-output-e2e-image
          path: |
            rhdh-must-gather-output.k8s.*.tar.gz
            rhdh-must-gather-output.k8s.*/
          retention-days: 5
