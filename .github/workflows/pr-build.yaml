name: PR Build

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - release-1.[0-9]+

env:
  IMAGE_NAME: rhdh-must-gather

jobs:
  pr-build:
    name: Build PR Container Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      image-built: ${{ steps.changed-files.outputs.any_changed }}
      image-tag: ${{ steps.prep.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false # Critical: Do not store GITHUB_TOKEN in .git/config

      # check changes in this commit for regex include and exclude matches
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            .github/workflows/pr-build.yaml
            .github/workflows/pr-push.yaml
            Makefile
            Containerfile
            .containerignore
            collection-scripts/**
            LICENSE
          files_ignore: |
            **/*.md
            **/*.adoc
            examples/**

      - name: List all changed files (for troubleshooting)
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          # Use printf and quoted variables to prevent word splitting/execution
          printf '%s\n' "$ALL_CHANGED_FILES" | while IFS= read -r file; do
            echo "Changed: $file"
          done

      # Generate image tags and build args
      - name: Prepare build variables
        if: steps.changed-files.outputs.any_changed == 'true'
        id: prep
        env:
          # Map context to ENV to prevent injection into the 'run' script
          PR_NUM: ${{ github.event.pull_request.number }}
          # Use PR head SHA, not the merge commit SHA that GitHub creates for pull_request events
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHORT_SHA="${PR_HEAD_SHA:0:9}"
          VERSION="0.0.0-${SHORT_SHA}"

          echo "IMAGE_TAG=pr-${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "EXTRA_TAGS=pr-${PR_NUM}-${SHORT_SHA} ${VERSION}-pr-${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "BUILD_ARGS=--build-arg RHDH_MUST_GATHER_VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build image
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          # Map outputs to environment variables here
          TAG: ${{ steps.prep.outputs.IMAGE_TAG }}
          ARGS: ${{ steps.prep.outputs.BUILD_ARGS }}
          NAME: ${{ env.IMAGE_NAME }}
        run: |
          make image-build \
            CONTAINER_TOOL=podman \
            IMAGE_NAME="$NAME" \
            IMAGE_TAG="$TAG" \
            BUILD_ARGS="$ARGS"

      # Save the image as a tarball for the push workflow
      - name: Save image to tarball
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
           NAME: ${{ env.IMAGE_NAME }}
           TAG: ${{ steps.prep.outputs.IMAGE_TAG }}
        run: |
          podman save "${NAME}:${TAG}" | gzip > image.tar.gz

      # Create metadata file for the push workflow
      - name: Create metadata
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE_TAG: ${{ steps.prep.outputs.IMAGE_TAG }}
          EXTRA_TAGS: ${{ steps.prep.outputs.EXTRA_TAGS }}
          VERSION: ${{ steps.prep.outputs.VERSION }}
        run: |
          jq -n \
            --argjson pr "$PR_NUMBER" \
            --arg it "$IMAGE_TAG" \
            --arg et "$EXTRA_TAGS" \
            --arg vs "$VERSION" \
            '{pr_number: $pr, image_tag: $it, extra_tags: $et, version: $vs}' > metadata.json

      - name: Upload image artifact
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pr-image
          path: |
            image.tar.gz
            metadata.json
          retention-days: 1

      - name: Summary
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          VERSION: ${{ steps.prep.outputs.VERSION }}
          IMAGE_TAG: ${{ steps.prep.outputs.IMAGE_TAG }}
          EXTRA_TAGS: ${{ steps.prep.outputs.EXTRA_TAGS }}
        run: |
          # Format tags as comma-separated backtick-wrapped list
          ALL_TAGS="\`${IMAGE_TAG}\`"
          for tag in ${EXTRA_TAGS}; do
            ALL_TAGS="${ALL_TAGS}, \`${tag}\`"
          done

          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Number**: ${PR_NUM}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Built and saved as artifact" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: ${ALL_TAGS}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The image will be pushed by the PR Push workflow." >> $GITHUB_STEP_SUMMARY

  e2e-tests:
    name: E2E Tests (Container Image)
    needs: pr-build
    if: needs.pr-build.outputs.image-built == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pr-image

      - name: Load image into podman
        env:
          TAG: ${{ needs.pr-build.outputs.image-tag }}
          NAME: ${{ env.IMAGE_NAME }}
        run: |
          gunzip -c image.tar.gz | podman load
          podman tag "${NAME}:${TAG}" "localhost/${NAME}:${TAG}"
          podman images

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq skopeo

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: rhdh-must-gather-e2e
          wait: 120s

      - name: Load image into Kind cluster
        env:
          TAG: ${{ needs.pr-build.outputs.image-tag }}
          NAME: ${{ env.IMAGE_NAME }}
        run: |
          podman save --format docker-archive "localhost/${NAME}:${TAG}" \
            | kind load image-archive /dev/stdin --name rhdh-must-gather-e2e

      - name: Run E2E tests
        env:
          TAG: ${{ needs.pr-build.outputs.image-tag }}
          NAME: ${{ env.IMAGE_NAME }}
        run: |
          make test-e2e \
            LOCAL=false \
            FULL_IMAGE_NAME="localhost/${NAME}:${TAG}" \
            HELM_SET="image.pullPolicy=Never,resources=null,dataHolder.resources=null"

      - name: Upload E2E must-gather output in case of failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-must-gather-output-pr-${{ github.event.pull_request.number }}
          path: e2e-cluster.mustgather.tar.gz
          retention-days: 7

      - name: Upload must-gather output
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: must-gather-output-e2e-image
          path: |
            rhdh-must-gather-output.k8s.*.tar.gz
            rhdh-must-gather-output.k8s.*/
          retention-days: 5
