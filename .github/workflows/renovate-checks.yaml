name: PR Renovate Config Validator

on:
  pull_request:
    paths:
      - '.github/renovate.json'
    # Renovate always uses the config from the repository default branch
    # https://docs.renovatebot.com/configuration-options/
    branches: [ 'main' ]

jobs:
  renovate-config-validator:
    runs-on: ubuntu-latest
    name: Renovate Config Validator
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate config
        # See https://docs.renovatebot.com/config-validation/
        run: |
          npx --yes --package renovate -- renovate-config-validator --strict .github/renovate.json

      - name: Validate JSONata expressions
        run: |
          npm install --no-save jsonata
          # Extract and validate all transformTemplates JSONata expressions
          jq -r '.. | .transformTemplates? // empty | .[]' .github/renovate.json | while IFS= read -r expr; do
            echo "Validating: $expr"
            node -e "const jsonata = require('jsonata'); jsonata(process.argv[1])" "$expr" || exit 1
          done
