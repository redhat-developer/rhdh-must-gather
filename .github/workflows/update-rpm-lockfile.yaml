name: Update RPM Lockfile

on:
  workflow_dispatch:
  schedule:
    # Run at 3AM UTC every Monday
    - cron: '0 3 * * 1'
  push:
    branches:
      - main
      - release-1.**
    paths:
      - 'rpms.in.yaml'
      - '.rhdh/docker/Containerfile'
      - '.github/workflows/update-rpm-lockfile.yaml'

permissions:
  contents: read

env:
  CONTAINERFILE_PATH: .rhdh/docker/Containerfile

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check if hermetic Containerfile exists
        run: |
          if [ ! -f "${{ env.CONTAINERFILE_PATH }}" ]; then
            echo "Error: ${{ env.CONTAINERFILE_PATH }} not found!"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install rpm-lockfile-prototype
        run: |
          if [[ ! -x "${HOME}/.local/bin/rpm-lockfile-prototype" ]]; then
            echo "Installing rpm-lockfile-prototype ..."
            sudo apt-get update
            sudo apt-get install -y python3 python3-pip python3-dev build-essential
            sudo apt-get install -y podman skopeo rpm
            sudo apt-get install -y dnf python3-dnf
            mkdir -p "${HOME}/.local/bin/"
            python3 -m pip install --user https://github.com/konflux-ci/rpm-lockfile-prototype/archive/refs/heads/main.zip
            export PATH=${PATH%":${HOME}/.local/bin"}:${HOME}/.local/bin
            echo "${HOME}/.local/bin" >> $GITHUB_PATH
          else
            echo "rpm-lockfile-prototype already installed"
          fi

      - name: Run rpm-lockfile-prototype
        run: |
          echo "Running '${HOME}/.local/bin/rpm-lockfile-prototype -f ${{ env.CONTAINERFILE_PATH }} rpms.in.yaml' in $(pwd)"
          ${HOME}/.local/bin/rpm-lockfile-prototype -f ${{ env.CONTAINERFILE_PATH }} rpms.in.yaml

      - name: Check for lockfile changes
        id: check-lockfile-changes
        run: |
          if git diff --quiet rpms.lock.yaml; then
            echo "No changes to rpms.lock.yaml detected, skipping PR creation"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in rpms.lock.yaml, creating PR"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Determine target branch
        id: target-branch
        run: |
          TARGET_BRANCH="${{ github.ref_name }}"
          echo "name=${TARGET_BRANCH}" >> $GITHUB_OUTPUT
          echo "Target branch: ${TARGET_BRANCH}"

      - name: Check if update PR already exists
        if: steps.check-lockfile-changes.outputs.changes == 'true'
        id: existing-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: chore/automated-update-rpm-lockfile/${{ steps.target-branch.outputs.name }}
        run: |
          pr_count=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          echo "exists=$([ "$pr_count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Create or update PR branch
        if: steps.check-lockfile-changes.outputs.changes == 'true' && steps.existing-pr.outputs.exists == 'false'
        env:
          BRANCH: chore/automated-update-rpm-lockfile/${{ steps.target-branch.outputs.name }}
        run: |
          git add rpms.lock.yaml
          git commit -m "chore: update rpms.lock.yaml [skip-build]"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"

      - name: Create Pull Request
        if: steps.check-lockfile-changes.outputs.changes == 'true' && steps.existing-pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ steps.target-branch.outputs.name }}
        run: |
          gh pr create \
            --title "chore: update RPM lockfile in branch (${TARGET_BRANCH}) [skip-build]" \
            --body "$(cat <<EOF
          ## Description

          This PR updates the \`rpms.lock.yaml\` file with the latest package versions based on current \`rpms.in.yaml\` configuration using \`${{ env.CONTAINERFILE_PATH }}\` as the base container context.

          Auto-generated by the [Update RPM Lockfile workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          EOF
          )"

      - name: Summary
        run: |
          if [ "${{ steps.check-lockfile-changes.outputs.changes }}" == "true" ]; then
            echo "RPM lockfile updated and PR created/updated"
          else
            echo "No changes detected in RPM lockfile"
          fi
