name: Pre-commit fix

on:
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  pre-commit-fix:
    name: Pre-commit fix
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    if: >-
      github.event.issue.pull_request
      && startsWith(github.event.comment.body, '/pre-commit')
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)

    steps:
      - name: Resolve PR head and reject forks
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const headRepo = pr.head.repo?.full_name || '';
            const baseRepo = pr.base.repo.full_name;
            const isFork = headRepo !== baseRepo;
            core.setOutput('is_fork', isFork.toString());
            if (isFork) {
              core.setFailed(
                `/pre-commit is not supported on fork PRs (head: ${headRepo}, base: ${baseRepo})`
              );
              return;
            }
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);

      - name: Comment on fork PR
        if: always() && steps.pr.outputs.is_fork == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '`/pre-commit` is not supported on fork PRs. Please run `pre-commit run --all-files` locally and push the fixes.',
            });

      - name: Add eyes reaction
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Checkout at pinned SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Set up PR branch
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: git switch -c "$HEAD_REF"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        continue-on-error: true
        with:
          extra_args: --all-files

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          branch: ${{ steps.pr.outputs.head_ref }}
          commit_message: "chore: run pre-commit hooks"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

      - name: Add result reaction
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const reaction = '${{ job.status }}' === 'success' ? '+1' : 'confused';
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: reaction,
            });
