name: Vendor Subtree Update Check

on:
  schedule:
    - cron: '23 7 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-updates:
    name: Check ${{ matrix.name }} update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: websocat
            repo: vi/websocat

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get latest release version
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(gh api "repos/${{ matrix.repo }}/releases/latest" --jq '.tag_name')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Latest ${{ matrix.name }} version: $version"

      - name: Check if update PR already exists
        id: existing-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="chore/update-${{ matrix.name }}-${{ steps.latest.outputs.version }}"
          pr_count=$(gh pr list --head "$branch" --state open --json number --jq 'length')
          echo "exists=$([ "$pr_count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Update vendor
        if: steps.existing-pr.outputs.exists == 'false'
        id: update
        env:
          VENDOR_NAME: ${{ matrix.name }}
          VENDOR_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          make vendor-update VENDOR_NAME="$VENDOR_NAME" VENDOR_VERSION="$VENDOR_VERSION"

          # Stage and commit changes (the script leaves them unstaged)
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add "vendor/$VENDOR_NAME" Containerfile Makefile
            git commit -m "chore(vendor): update $VENDOR_NAME to $VENDOR_VERSION"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.existing-pr.outputs.exists == 'false' && steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="chore/update-${{ matrix.name }}-${{ steps.latest.outputs.version }}"
          git checkout -b "$branch"
          git push -u origin "$branch"
          gh pr create \
            --title "chore(vendor): update ${{ matrix.name }} to ${{ steps.latest.outputs.version }}" \
            --body "$(cat <<EOF
          ## Summary

          - Update vendored \`${{ matrix.name }}\` subtree to \`${{ steps.latest.outputs.version }}\`
          - Release notes: https://github.com/${{ matrix.repo }}/releases/tag/${{ steps.latest.outputs.version }}

          ## Test plan

          - [ ] \`make image-build\` succeeds
          - [ ] \`make test\` passes
          - [ ] Verify binary version: \`podman run --rm --entrypoint="" <image> ${{ matrix.name }} --version\`

          Auto-generated by the [vendor-update workflow](https://github.com/${{ github.repository }}/actions/workflows/vendor-update.yaml).
          EOF
          )"
